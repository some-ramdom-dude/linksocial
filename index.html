<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            margin: 0; 
            padding: 100px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Minimalist Top Right Logo */
        .logo {
            position: fixed;
            top: 30px;
            right: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: -0.5px;
            color: #000;
        }

        .container { width: 100%; max-width: 400px; }

        h2 { font-weight: 400; font-size: 1rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea { 
            width: 100%; 
            margin-bottom: 10px; 
            padding: 12px 0; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #eee; 
            color: #000; 
            font-family: inherit; 
            box-sizing: border-box;
        }

        input:focus, textarea:focus { outline: none; border-bottom: 1px solid #000; }

        button { 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            border: none; 
            color: #fff; 
            cursor: pointer; 
            margin-top: 10px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        button:hover { opacity: 0.8; }

        .hidden { display: none; }

        #feed { margin-top: 60px; width: 100%; max-width: 400px; }

        .post { 
            padding: 20px 0; 
            border-bottom: 1px solid #f0f0f0; 
        }

        .post-header { display: flex; align-items: center; margin-bottom: 8px; }
        .post img { width: 20px; height: 20px; margin-right: 10px; filter: grayscale(100%); }
        .post-title { font-weight: 600; font-size: 0.95rem; }
        .post-desc { font-size: 0.85rem; color: #666; margin: 5px 0 10px 0; }
        .post-link { font-size: 0.75rem; text-decoration: underline; color: #000; font-weight: 600; }

        .logout-link { color: #ccc; text-decoration: none; font-size: 0.7rem; margin-top: 20px; display: block; text-align: center; }
        .logout-link:hover { color: #000; }
    </style>
</head>
<body>

<div class="logo">linksocial</div>

<div class="container">
    <div id="login-ui">
        <h2>Identify</h2>
        <input type="email" id="email-input" placeholder="email address">
        <button onclick="login()">Get Link</button>
    </div>

    <div id="post-ui" class="hidden">
        <h2>New Entry</h2>
        <input type="text" id="post-title" placeholder="title">
        <input type="text" id="post-url" placeholder="url">
        <textarea id="post-desc" rows="2" placeholder="description"></textarea>
        <button id="publish-btn" onclick="publish()">Submit</button>
        <a href="#" onclick="logout()" class="logout-link">logout <span id="user-display"></span></a>
    </div>
</div>

<div id="feed"></div>

<script>
    const SB_URL = 'https://brsimqabgcqsrjdxlqyw.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyc2ltcWFiZ2Nxc3JkanhscXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTExOTksImV4cCI6MjA4ODY2NzE5OX0.26MOlBfwgwfzFYvV2C6jF90vYyJpWLF5GthoOlBSTJY'; 
    const client = supabase.createClient(SB_URL, SB_KEY);

    async function checkStatus() {
        const { data: { user } } = await client.auth.getUser();
        if (user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('post-ui').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
            fetchPosts();
        }
    }
    checkStatus();

    async function login() {
        const email = document.getElementById('email-input').value;
        const { error } = await client.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: 'https://some-ramdom-dude.github.io/linksocial/' }
        });
        if (error) alert(error.message);
        else alert("Link sent to inbox.");
    }

    async function publish() {
        const btn = document.getElementById('publish-btn');
        btn.innerText = "...";
        btn.disabled = true;

        const { data: { user } } = await client.auth.getUser();
        const urlV = document.getElementById('post-url').value;
        const titleV = document.getElementById('post-title').value;
        const descV = document.getElementById('post-desc').value;
        const iconU = `https://api.microlink.io/?url=${encodeURIComponent(urlV)}&embed=logo.url`;

        const { error } = await client
            .from('posts')
            .insert([{ url: urlV, title: titleV, desc: descV, icon: iconU, user_id: user.id }]);

        if (error) {
            alert("Error: " + error.message);
            btn.innerText = "Submit";
            btn.disabled = false;
        } else {
            location.reload(); 
        }
    }

    async function fetchPosts() {
        const { data, error } = await client.from('posts').select('*').order('created_at', { ascending: false });
        if (error) return;

        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(post => `
            <div class="post">
                <div class="post-header">
                    <img src="${post.icon}" onerror="this.style.display='none'">
                    <span class="post-title">${post.title}</span>
                </div>
                <p class="post-desc">${post.desc}</p>
                <a href="${post.url}" target="_blank" class="post-link">VIEW</a>
            </div>
        `).join('');
    }

    async function logout() {
        await client.auth.signOut();
        location.reload();
    }
</script>

</body>
</html>
