<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toast-container"></div>

    <div id="app">
        <main id="login-ui" class="container">
            <h1 class="title">LinkSocial</h1>
            <div class="auth-box">
                <input type="email" id="email-input" class="input-field" placeholder="Email">
                <input type="password" id="password-input" class="input-field" placeholder="Password">
                <button class="btn-main" onclick="auth.handleAuth('login')">Login</button>
                <div class="divider"><span>OR</span></div>
                <button class="btn-google" onclick="auth.loginWithGoogle()">
                    <img src="https://www.google.com/favicon.ico" width="14"> Continue with Google
                </button>
                <p class="switch-text">New here? <span onclick="auth.handleAuth('signup')">Sign Up</span></p>
            </div>
        </main>

        <main id="main-ui" class="container hidden">
            <div class="header-nav">
                <input type="text" id="user-search" placeholder="Search..." onkeyup="ui.handleSearch(event)">
                <button class="icon-btn" onclick="ui.openModal('post-modal')">Post</button>
                <button class="icon-btn" onclick="ui.showView('profile')">Profile</button>
                <button class="icon-btn" onclick="ui.openModal('settings-modal')">⚙️</button>
            </div>

            <div id="feed-view">
                <h2 id="current-user-handle-display">@handle</h2>
                <div id="feed-container"></div>
            </div>

            <div id="profile-view" class="hidden">
                <button class="back-btn" onclick="ui.showView('feed')">← Back</button>
                <div class="profile-card">
                    <img id="view-pfp" src="" class="profile-pfp-lg">
                    <h2 id="view-display-name">Display Name</h2>
                    <p id="view-handle">@handle</p>
                </div>
                <div class="profile-tabs">
                    <button class="tab-btn active" onclick="ui.loadProfileTab('saved', this)">Saved</button>
                    <button class="tab-btn" onclick="ui.loadProfileTab('liked', this)">Liked</button>
                </div>
                <div id="profile-posts-container"></div>
            </div>

            <footer class="repo-footer">
                <a href="https://github.com/some-ramdom-dude/linksocial" target="_blank">GitHub repository</a>
            </footer>
        </main>
    </div>

    <div id="post-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="ui.closeModal('post-modal')">&times;</button>
            <h3>New Post</h3>
            <input type="text" id="link-input" class="input-field" placeholder="Link (https://...)">
            <textarea id="post-text" class="input-field" placeholder="What's happening?"></textarea>
            <button class="btn-main" onclick="posts.create()">Post</button>
        </div>
    </div>

    <div id="onboarding-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Welcome!</h2>
            <input type="text" id="set-handle" class="input-field" placeholder="@username">
            <button class="btn-main" onclick="profile.setup()">Claim Handle</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
