<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial | Identity</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="notification" class="hidden"></div>

    <div id="app">
        <main id="login-ui" class="container">
            <h2 class="section-title">LinkSocial</h2>
            <p class="subtitle">CONNECT YOUR IDENTITY</p>

            <div class="auth-box">
                <input type="email" id="email-input" class="input-flat" placeholder="EMAIL ADDRESS">
                <input type="password" id="password-input" class="input-flat" placeholder="PASSWORD">
                
                <div class="auth-stack">
                    <button class="btn-primary" onclick="auth.handleAuth('login')">SIGN IN</button>
                    <button class="btn-outline" onclick="auth.handleAuth('signup')">CREATE ACCOUNT</button>
                </div>

                <div class="divider"><span>OR</span></div>
                
                <button class="btn-google" onclick="auth.loginWithGoogle()">
                    CONTINUE WITH GOOGLE
                </button>
            </div>
        </main>

        <main id="main-ui" class="container hidden">
            <h2 id="user-greeting">Welcome back!</h2>
            <button class="btn-outline" onclick="auth.logout()">LOGOUT</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
