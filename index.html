<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <nav class="nav-header">
        <a href="#" class="logo">LinkSocial</a>
        <button class="btn-primary hidden" id="nav-post-btn" onclick="ui.toggleModal('post-modal', true)">+ Post</button>
        <button class="btn-secondary hidden" id="nav-logout-btn" onclick="auth.logout()">Sign Out</button>
    </nav>

    <main id="login-ui" class="container">
        <h2 class="section-title">Identity Required</h2>
        <input type="email" id="email-input" class="input-flat" placeholder="EMAIL ADDRESS">
        <button class="btn-primary full-width" onclick="auth.login()">Get Access</button>
    </main>

    <main id="onboarding-ui" class="container hidden">
        <h2 class="section-title">Complete Your Profile</h2>
        <input type="text" id="set-handle" class="input-flat" placeholder="HANDLE (e.g. tech_guru) *Required">
        <input type="text" id="set-display-name" class="input-flat" placeholder="DISPLAY NAME (Optional)">
        <input type="text" id="set-pfp" class="input-flat" placeholder="PFP IMAGE URL (Optional)">
        <button class="btn-primary full-width" onclick="auth.saveProfile()">Save & Start</button>
    </main>

    <main id="feed-ui" class="container hidden">
        <div id="feed-container"></div>
    </main>

    <div id="post-modal" class="modal">
        <div class="modal-content">
            <h2 class="section-title">New Entry</h2>
            <input type="text" id="post-title" class="input-flat" placeholder="TITLE">
            <input type="text" id="post-url" class="input-flat" placeholder="URL">
            <textarea id="post-desc" class="input-flat" rows="3" placeholder="DESCRIPTION"></textarea>
            <button class="btn-primary full-width" onclick="posts.publish()">Publish</button>
            <p class="cancel-text" onclick="ui.toggleModal('post-modal', false)">CANCEL</p>
        </div>
    </div>

    <div id="undo-toast" class="toast hidden">
        Post sent... <span class="undo-btn" onclick="posts.cancelPublish()">UNDO</span>
    </div>

</body>
</html>
