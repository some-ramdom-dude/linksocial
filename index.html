<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #000; --border: #eee; --gray: #888; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; margin: 0; padding: 100px 20px; display: flex; flex-direction: column; align-items: center; }

        /* 1. TOP RIGHT NAVIGATION */
        .nav-header { position: fixed; top: 30px; right: 40px; display: flex; align-items: center; gap: 20px; z-index: 1000; }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; text-transform: lowercase; text-decoration: none; color: #000; }
        
        .btn-post { 
            background: #000; color: #fff; border: none; padding: 10px 20px; font-size: 0.7rem; 
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-post:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-post:active { transform: scale(0.95); }

        /* 2. SEARCH & FILTERS */
        .controls { width: 100%; max-width: 500px; margin-bottom: 40px; display: flex; gap: 10px; }
        .search-bar { flex: 1; border: none; border-bottom: 1px solid var(--border); padding: 10px; font-family: inherit; }
        .search-bar:focus { outline: none; border-bottom: 1px solid #000; }
        .filter-select { border: none; font-size: 0.7rem; text-transform: uppercase; color: var(--gray); cursor: pointer; }

        .container { width: 100%; max-width: 500px; }
        .hidden { display: none; }
        
        /* Modal for Posting */
        .modal { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content { width: 90%; max-width: 400px; }

        /* POST STYLES */
        .post { padding: 30px 0; border-bottom: 1px solid #f5f5f5; position: relative; animation: fadeIn 0.5s ease forwards; }
        .post-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .post-meta { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .post-desc { font-size: 0.9rem; line-height: 1.6; color: #444; margin-bottom: 15px; }
        
        /* ADMIN CONTROLS */
        .mod-tools { margin-top: 10px; display: flex; gap: 15px; }
        .btn-del { color: #ff4444; font-size: 0.65rem; border: none; background: none; cursor: pointer; text-transform: uppercase; padding: 0; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="#" class="logo">LinkSocial</a>
    <button class="btn-post" id="open-post-btn" onclick="toggleModal(true)">+ Post</button>
</div>

<div class="controls">
    <input type="text" id="search-input" class="search-bar" placeholder="Search entries..." oninput="fetchPosts()">
    <select id="filter-input" class="filter-select" onchange="fetchPosts()">
        <option value="all">All Content</option>
        <option value="safe">Safe Only</option>
        <option value="media">Media</option>
    </select>
</div>

<div id="login-ui" class="container">
    <h2 style="font-size: 0.8rem; letter-spacing: 2px; color: #999; text-transform: uppercase;">Identity Required</h2>
    <input type="email" id="email-input" style="width:100%; padding:15px 0; border:none; border-bottom:1px solid #eee; margin-bottom:20px;" placeholder="EMAIL">
    <button onclick="login()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; cursor:pointer;">GET ACCESS</button>
</div>

<div id="post-modal" class="modal">
    <div class="modal-content">
        <h2 style="text-transform:uppercase; font-size:0.8rem; letter-spacing:2px;">New Entry</h2>
        <input type="text" id="post-title" style="width:100%; padding:10px 0; border:none; border-bottom:1px solid #eee; margin-bottom:15px;" placeholder="TITLE">
        <input type="text" id="post-url" style="width:100%; padding:10px 0; border:none; border-bottom:1px solid #eee; margin-bottom:15px;" placeholder="URL">
        <textarea id="post-desc" rows="3" style="width:100%; padding:10px 0; border:none; border-bottom:1px solid #eee; margin-bottom:20px;" placeholder="DESCRIPTION"></textarea>
        <button onclick="publish()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; cursor:pointer;">PUBLISH</button>
        <p onclick="toggleModal(false)" style="text-align:center; font-size:0.7rem; margin-top:20px; cursor:pointer; color:#999;">CANCEL</p>
    </div>
</div>

<div id="feed" class="container"></div>

    async function deletePost(id) {

    async function fetchPosts() {
        const search = document.getElementById('search-input').value;
