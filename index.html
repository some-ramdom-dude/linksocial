<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3ecf8e;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ededed;
            --accent: #2e2e2e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fancy Top Right Logo */
        .logo {
            position: absolute;
            top: 25px;
            right: 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            letter-spacing: -1px;
            color: var(--primary);
            text-transform: lowercase;
            text-shadow: 0 0 15px rgba(62, 207, 142, 0.3);
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            background: var(--card); 
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid var(--accent);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h2 { margin-bottom: 25px; font-weight: 600; font-size: 1.2rem; color: #fff; }

        input, textarea { 
            width: 100%; 
            margin-bottom: 15px; 
            padding: 14px; 
            background: #000; 
            border: 1px solid var(--accent); 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box;
            font-family: inherit;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            border: none; 
            color: #000; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 12px; 
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover { 
            background: #4ef0a3; 
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(62, 207, 142, 0.4);
        }

        .hidden { display: none; }

        #feed { 
            margin-top: 40px; 
            width: 100%;
            max-width: 450px;
        }

        .post { 
            background: var(--card); 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--accent);
            transition: transform 0.2s;
        }

        .post:hover { transform: scale(1.02); }

        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .post img { width: 28px; height: 28px; border-radius: 8px; margin-right: 12px; background: #000; }
        .post-title { font-weight: 600; font-size: 1.1rem; color: #fff; }
        .post-desc { font-size: 0.95rem; color: #999; margin-bottom: 15px; line-height: 1.5; }
        .post-link { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 700;
            display: inline-block;
        }

        .logout-link { color: #666; text-decoration: none; font-size: 0.8rem; margin-top: 15px; display: block; text-align: center; }
        .logout-link:hover { color: #ff4d4d; }
    </style>
</head>
<body>

<div class="logo">linksocial</div>

<div class="container">
    <div id="login-ui">
        <h2>Welcome back</h2>
        <input type="email" id="email-input" placeholder="name@email.com">
        <button onclick="login()">Send Magic Link</button>
    </div>

    <div id="post-ui" class="hidden">
        <h2>Create a Post</h2>
        <input type="text" id="post-title" placeholder="What's the title?">
        <input type="text" id="post-url" placeholder="https://website.com">
        <textarea id="post-desc" rows="3" placeholder="Tell us about it..."></textarea>
        <button id="publish-btn" onclick="publish()">Publish to Feed</button>
        <a href="#" onclick="logout()" class="logout-link">Log out of <span id="user-display"></span></a>
    </div>
</div>

<div id="feed">
    <p style="text-align:center; color:#444;">Checking community posts...</p>
</div>

<script>
    const SB_URL = 'https://brsimqabgcqsrjdxlqyw.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyc2ltcWFiZ2Nxc3JkanhscXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTExOTksImV4cCI6MjA4ODY2NzE5OX0.26MOlBfwgwfzFYvV2C6jF90vYyJpWLF5GthoOlBSTJY'; 
    const client = supabase.createClient(SB_URL, SB_KEY);

    async function checkStatus() {
        const { data: { user } } = await client.auth.getUser();
        if (user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('post-ui').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
            fetchPosts();
        } else {
            document.getElementById('feed').innerHTML = '<p style="text-align:center; color:#444;">Login to view the community feed.</p>';
        }
    }
    checkStatus();

    async function login() {
        const email = document.getElementById('email-input').value;
        const { error } = await client.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: 'https://some-ramdom-dude.github.io/linksocial/' }
        });
        if (error) alert(error.message);
        else alert("Magic Link sent! Check your inbox.");
    }

    async function publish() {
        const btn = document.getElementById('publish-btn');
        btn.innerText = "Publishing...";
        btn.disabled = true;

        const { data: { user } } = await client.auth.getUser();
        const urlV = document.getElementById('post-url').value;
        const titleV = document.getElementById('post-title').value;
        const descV = document.getElementById('post-desc').value;
        const iconU = `https://api.microlink.io/?url=${urlV}&embed=logo.url`;

        const { error } = await client
            .from('posts')
            .insert([{ url: urlV, title: titleV, desc: descV, icon: iconU, user_id: user.id }]);

        if (error) {
            alert(error.message);
            btn.innerText = "Publish to Feed";
            btn.disabled = false;
        } else {
            location.reload(); 
        }
    }

    async function fetchPosts() {
        const { data, error } = await client.from('posts').select('*').order('created_at', { ascending: false });
        if (error) return;

        const feed = document.getElementById('feed');
        if (data.length === 0) {
            feed.innerHTML = '<p style="text-align:center; color:#444;">No posts here yet.</p>';
            return;
        }

        feed.innerHTML = data.map(post => `
            <div class="post">
                <div class="post-header">
                    <img src="${post.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/124/124010.png'">
                    <span class="post-title">${post.title}</span>
                </div>
                <p class="post-desc">${post.desc}</p>
                <a href="${post.url}" target="_blank" class="post-link">OPEN CONTENT →</a>
            </div>
        `).join('');
    }

    async function logout() {
        await client.auth.signOut();
        location.reload();
    }
</script>

</body>
</html>
