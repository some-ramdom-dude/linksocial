<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2260%22 fill=%22black%22>LS</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="app">
        <main id="login-ui" class="container">
            <h1 class="title">LinkSocial</h1>
            <div class="auth-box">
                <input type="email" id="email-input" class="input-field" placeholder="Email">
                <input type="password" id="password-input" class="input-field" placeholder="Password">
                <div class="btn-group">
                    <button class="btn-main" onclick="auth.handleAuth('login')">Login</button>
                    <button class="btn-sub" onclick="auth.handleAuth('signup')">Sign Up</button>
                </div>
                <div class="divider">OR</div>
                <button class="btn-google" onclick="auth.loginWithGoogle()">Continue with Google</button>
            </div>
        </main>

        <main id="main-ui" class="container hidden">
            <div class="header-nav">
                <div class="search-container">
                    <input type="text" id="user-search" placeholder="Search @handle..." onkeyup="ui.handleSearch(event)">
                </div>
                <button class="icon-btn" onclick="ui.openModal('profile-modal')">Settings</button>
            </div>

            <div class="user-info-bar">
                <h2 id="current-user-handle">@handle</h2>
            </div>
            
            <div class="create-post">
                <input type="text" id="link-input" class="input-field" placeholder="Paste link (https://...)">
                <textarea id="post-text" class="input-field" placeholder="Write something... #hashtags @mentions"></textarea>
                <button class="btn-main" onclick="posts.create()">Post</button>
            </div>

            <div id="feed-container"></div>

            <div id="profile-modal" class="modal hidden">
                <div class="modal-content">
                    <button class="close-btn" onclick="ui.closeModal('profile-modal')">&times;</button>
                    <h3>Profile Settings</h3>
                    <p id="handle-cooldown" class="cooldown-notice"></p>
                    <input type="text" id="edit-handle" class="input-field" placeholder="@handle">
                    <input type="text" id="edit-display-name" class="input-field" placeholder="Display Name">
                    <input type="text" id="edit-pfp" class="input-field" placeholder="Profile Picture URL">
                    <button class="btn-main" id="save-profile-btn" onclick="profile.update()">Update Profile</button>
                    <hr>
                    <button class="btn-danger" onclick="auth.logout()">Logout</button>
                </div>
            </div>

            <div id="onboarding-modal" class="modal hidden">
                <div class="modal-content">
                    <h2 class="title" style="font-size: 1.5rem;">Claim your @handle</h2>
                    <p style="font-size: 0.8rem; margin-bottom: 20px;">This is unique to you. Choose wisely.</p>
                    <input type="text" id="set-handle" class="input-field" placeholder="@username">
                    <button class="btn-main" onclick="profile.setup()">Start Socializing</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
