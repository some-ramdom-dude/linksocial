<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSocial | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --bg: #0a0a0a; --card: #161616; --text: #ededed; --accent: #2e2e2e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 80px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { position: fixed; top: 25px; right: 30px; font-family: 'Montserrat', sans-serif; font-size: 1.5rem; color: var(--primary); text-transform: lowercase; z-index: 100; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h2 { margin-bottom: 25px; font-weight: 600; font-size: 1.2rem; color: #fff; text-align: center; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 14px; background: #000; border: 1px solid var(--accent); color: white; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 14px; background: var(--primary); border: none; color: #000; font-weight: 700; cursor: pointer; border-radius: 12px; transition: all 0.3s; text-transform: uppercase; }
        button:hover { background: #4ef0a3; transform: translateY(-2px); }
        .hidden { display: none; }
        #feed { margin-top: 40px; width: 100%; max-width: 450px; }
        .post { background: var(--card); padding: 20px; margin-bottom: 20px; border-radius: 20px; border: 1px solid var(--accent); }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .post img { width: 32px; height: 32px; border-radius: 8px; margin-right: 12px; background: #222; object-fit: cover; }
        .post-title { font-weight: 600; font-size: 1.1rem; color: #fff; }
        .post-desc { font-size: 0.95rem; color: #999; margin-bottom: 15px; line-height: 1.5; }
        .post-link { color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 700; }
        .logout-link { color: #666; text-decoration: none; font-size: 0.8rem; margin-top: 15px; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="logo">linksocial</div>

<div class="container">
    <div id="login-ui">
        <h2>Enter the Community</h2>
        <input type="email" id="email-input" placeholder="email@example.com">
        <button onclick="login()">Get Magic Link</button>
    </div>

    <div id="post-ui" class="hidden">
        <h2>New Post</h2>
        <input type="text" id="post-title" placeholder="Catchy Title">
        <input type="text" id="post-url" placeholder="Paste URL here (https://...)">
        <textarea id="post-desc" rows="3" placeholder="What's this link about?"></textarea>
        <button id="publish-btn" onclick="publish()">Publish</button>
        <a href="#" onclick="logout()" class="logout-link">Logout: <span id="user-display"></span></a>
    </div>
</div>

<div id="feed"></div>

<script>
    const SB_URL = 'https://brsimqabgcqsrjdxlqyw.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyc2ltcWFiZ2Nxc3JkanhscXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTExOTksImV4cCI6MjA4ODY2NzE5OX0.26MOlBfwgwfzFYvV2C6jF90vYyJpWLF5GthoOlBSTJY'; 
    const client = supabase.createClient(SB_URL, SB_KEY);

    async function checkStatus() {
        const { data: { user } } = await client.auth.getUser();
        if (user) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('post-ui').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
            fetchPosts();
        }
    }
    checkStatus();

    async function login() {
        const email = document.getElementById('email-input').value;
        const { error } = await client.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: 'https://some-ramdom-dude.github.io/linksocial/' }
        });
        if (error) alert("Login Error: " + error.message);
        else alert("Link sent! Check your email.");
    }

    async function publish() {
        const btn = document.getElementById('publish-btn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const { data: { user } } = await client.auth.getUser();
            if (!user) throw new Error("User not found. Please log in again.");

            const urlV = document.getElementById('post-url').value;
            const titleV = document.getElementById('post-title').value;
            const descV = document.getElementById('post-desc').value;
            const iconU = `https://api.microlink.io/?url=${encodeURIComponent(urlV)}&embed=logo.url`;

            const { error } = await client
                .from('posts')
                .insert([{ 
                    url: urlV, 
                    title: titleV, 
                    desc: descV, 
                    icon: iconU, 
                    user_id: user.id 
                }]);

            if (error) {
                // THIS ALERT WILL TELL US EXACTLY WHAT IS WRONG
                alert("DATABASE SAYS: " + error.message + "\nHint: Check if your table columns match!");
                console.error(error);
            } else {
                alert("Success! Post added.");
                location.reload(); 
            }
        } catch (err) {
            alert("System Error: " + err.message);
        } finally {
            btn.innerText = "Publish";
            btn.disabled = false;
        }
    }

    async function fetchPosts() {
        const { data, error } = await client.from('posts').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);

        const feed = document.getElementById('feed');
        if (!data || data.length === 0) {
            feed.innerHTML = '<p style="text-align:center; color:#444;">No posts yet.</p>';
            return;
        }

        feed.innerHTML = data.map(post => `
            <div class="post">
                <div class="post-header">
                    <img src="${post.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/124/124010.png'">
                    <span class="post-title">${post.title}</span>
                </div>
                <p class="post-desc">${post.desc}</p>
                <a href="${post.url}" target="_blank" class="post-link">VIEW SITE →</a>
            </div>
        `).join('');
    }

    async function logout() {
        await client.auth.signOut();
        location.reload();
    }
</script>

</body>
</html>
